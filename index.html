<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Loop</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;

            max-width: 100%;
            max-height: 100vh;
            display: block;
        }
    </style>

    <div class="gif-container">
        <!-- REPLACE 'your-filename.gif' WITH THE EXACT NAME OF YOUR UPLOADED GIF -->

    </div>

</html>
