<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Days Since...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4; /* Feel free to change the background color */
            color: #333;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px; /* Optional: gives the GIF slightly rounded corners */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* Optional: adds a nice shadow */
        }
    </style>
</head>
<body>

    <h1>Days Since [Insert Event]</h1>
    
    <div class="gif-container">
        <!-- REPLACE 'your-filename.gif' WITH THE EXACT NAME OF YOUR UPLOADED GIF -->
        <img src="your-filename.gif" alt="A relevant GIF playing on a loop">
    </div>

</body>
</html>
